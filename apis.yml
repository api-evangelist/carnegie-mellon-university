apis:
  - aid: carnegie-mellon-university:delphi-epidata
    name: Delphi Epidata API
    description: >-
      Public, anonymously accessible HTTP/JSON API maintained by the Carnegie
      Mellon University Delphi research group providing real-time and
      historical epidemiological surveillance data, including the COVIDcast
      endpoint and a range of disease signals (influenza, dengue, norovirus
      and more). R and Python clients are available. Verified returning live
      JSON at the base URL.
    humanURL: https://cmu-delphi.github.io/delphi-epidata/
    baseURL: https://api.delphi.cmu.edu/epidata/
    tags: [ Epidemiology, Health Data, Research, Open Data, Public Health ]
    properties:
      - type: Documentation
        url: https://cmu-delphi.github.io/delphi-epidata/
      - type: GitHub
        url: https://github.com/cmu-delphi/delphi-epidata
  - aid: carnegie-mellon-university:kilthub-oai-pmh
    name: KiltHub Repository OAI-PMH (figshare)
    description: >-
      OAI-PMH metadata harvesting endpoint for CMU's KiltHub institutional
      repository, the University Libraries' platform for research data and
      scholarly outputs, hosted on figshare. The CMU-scoped set (portal_231)
      returns institution records and the endpoint is verified returning valid
      OAI-PMH XML. The underlying figshare v2 REST API is also publicly
      reachable.
    humanURL: https://guides.library.cmu.edu/kilthub
    baseURL: https://api.figshare.com/v2/oai
