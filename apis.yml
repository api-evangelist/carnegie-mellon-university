aid: carnegie-mellon-university
name: Carnegie Mellon University
description: >-
  Carnegie Mellon University is a private research university in Pittsburgh,
  Pennsylvania, United States, ranked #50 in the QS World University Rankings
  2025. Its public developer and API footprint is concentrated in research and
  library infrastructure rather than a single central developer portal. The
  most prominent public API is the Delphi Epidata API, a real-time
  epidemiological data API maintained by CMU's Delphi research group. The
  University Libraries operate the KiltHub institutional repository (hosted on
  figshare) which exposes research data and scholarly outputs via OAI-PMH and
  the figshare REST API, and CMU runs a campus-wide Shibboleth/Web Login
  single sign-on identity service.
