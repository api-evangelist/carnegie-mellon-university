  - date: '2026-06-03'
    rating: 3
    summary: >-
      CMU has no single central developer portal, but a genuinely strong
      public research-API footprint. Verified live: the Delphi Epidata API
      returns real JSON (covidcast_meta and fluview both 200) with full docs
      and an active GitHub org (cmu-delphi); the KiltHub OAI-PMH endpoint on
      figshare returns valid OAI-PMH XML with real CMU records in set
      portal_231; and the Shibboleth Web Login identity provider metadata
      resolves. The Heinz College courses_api now 302-redirects to a student
      web page and is no longer a usable public API, so it was excluded. The
      Schedule of Classes is a servlet web app, not a documented API, so it was
      not cataloged as an API. No fabricated endpoints; only verified URLs and
      properties are included.
